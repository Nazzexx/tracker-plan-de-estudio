<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Tracker Pro - UTN Sistemas. Gestor interactivo de correlativas y avance de carrera.">
  <title>UTN Sistemas – Tracker Pro | Optimizado</title>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3480409078905299"
    crossorigin="anonymous"></script>

  <!-- Google AdSense - Código de verificación -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3480409078905239"
    crossorigin="anonymous"></script>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap"
    rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css">

  <!-- Scripts Diferidos -->
  <script defer src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <!-- Main Script -->
  <script defer src="script.js"></script>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Protección de sesión: se ejecuta ANTES que el resto de la página -->
  <script>
    (async () => {
      const { createClient } = supabase;
      const sb = createClient(
        'https://qfqajybfwvfqowcfwibv.supabase.co',
        'sb_publishable_dMFDLETv_JEKYmNxgIYl6w_0gmhJS8Q'
      );
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        // No hay sesión → redirigir al login
        window.location.replace('login.html');
      }
      // Guardamos el cliente en window para usarlo desde script.js si hace falta
      window._sb = sb;
    })();
  </script>
</head>

<body style="visibility:hidden" onload="document.body.style.visibility='visible'"

  <!-- ═══════════════════════════════════════════════════
     HEADER
     ════════════════════════════════════════════════ -->
  <header>
    <div class="header-title" style="position:relative;">
      <h1>UTN SISTEMAS</h1>
      <button id="btn-user-panel" onclick="toggleUserPanel()" style="
        background:none; border:none; padding:0; cursor:pointer;
        display:flex; align-items:center; gap:0.4rem;
        font-family:'IBM Plex Mono',monospace;
      " title="Ver perfil">
        <p style="color:#22d3ee; font-size:inherit; transition:opacity 0.2s;">Tracker Pro</p>
        <svg id="user-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"
          style="color:#22d3ee; transition:transform 0.25s; flex-shrink:0; margin-top:1px;">
          <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Panel de usuario -->
      <div id="user-panel" style="
        display:none; opacity:0; transform:translateY(-6px);
        position:absolute; top:calc(100% + 10px); left:0;
        width:240px; background:#0f0f18;
        border:1px solid #2e2e4e; border-radius:2px;
        z-index:999; overflow:hidden;
        transition:opacity 0.2s, transform 0.2s;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      ">
        <!-- Borde superior decorativo -->
        <div style="height:2px; background:linear-gradient(90deg,transparent,#22d3ee,#10b981,transparent);"></div>

        <!-- Avatar + nombre -->
        <div style="padding:1rem 1rem 0.75rem; border-bottom:1px solid #1e1e2e;">
          <div style="display:flex; align-items:center; gap:0.65rem;">
            <div id="user-avatar" style="
              width:32px; height:32px; border-radius:2px;
              background:linear-gradient(135deg,#0e7490,#065f46);
              border:1px solid #2e2e4e;
              display:flex; align-items:center; justify-content:center;
              font-family:'Syne',sans-serif; font-weight:800;
              font-size:0.85rem; color:#22d3ee; flex-shrink:0;
            ">?</div>
            <div style="overflow:hidden;">
              <div id="user-displayname" style="
                font-family:'Syne',sans-serif; font-weight:700;
                font-size:0.8rem; color:#e2e8f0;
                white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
              ">—</div>
              <div id="user-email" style="
                font-size:0.6rem; color:#475569; letter-spacing:0.04em;
                white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
              ">—</div>
            </div>
          </div>
        </div>

        <!-- Progreso -->
        <div style="padding:0.75rem 1rem; border-bottom:1px solid #1e1e2e;">
          <div style="font-size:0.58rem; letter-spacing:0.1em; text-transform:uppercase; color:#475569; margin-bottom:0.5rem;">
            Progreso de carrera
          </div>
          <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.4rem;">
            <span id="panel-materias" style="font-size:0.72rem; color:#e2e8f0;">— / — materias</span>
            <span id="panel-pct" style="font-size:0.72rem; color:#22d3ee; font-weight:500;">0%</span>
          </div>
          <div style="height:3px; background:#1e1e2e; border-radius:1px; overflow:hidden;">
            <div id="panel-barra" style="height:100%; width:0%; background:linear-gradient(90deg,#22d3ee,#10b981); border-radius:1px; transition:width 0.4s ease;"></div>
          </div>
        </div>

        <!-- Botón cerrar sesión -->
        <button onclick="cerrarSesion()" style="
          width:100%; padding:0.65rem 1rem;
          background:none; border:none; cursor:pointer;
          font-family:'IBM Plex Mono',monospace; font-size:0.65rem;
          letter-spacing:0.1em; text-transform:uppercase;
          color:#475569; text-align:left;
          transition:background 0.15s, color 0.15s;
          display:flex; align-items:center; gap:0.5rem;
        "
        onmouseover="this.style.background='rgba(248,113,113,0.07)';this.style.color='#f87171'"
        onmouseout="this.style.background='none';this.style.color='#475569'">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M4 2H2V8H4M6.5 3.5L8.5 5L6.5 6.5M8.5 5H4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Cerrar sesión
        </button>
      </div>
    </div>

    <div class="stats">
      <div class="stat green">
        <div class="stat-n" id="s-aprobadas">0</div>
        <div class="stat-l">Aprobadas</div>
      </div>
      <div class="stat amber">
        <div class="stat-n" id="s-regulares">0</div>
        <div class="stat-l">Regulares</div>
      </div>
      <div class="stat cyan">
        <div class="stat-n" id="s-cursables">0</div>
        <div class="stat-l">Cursables</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span id="p-label">0 / 0 materias aprobadas</span>
        <span id="p-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="barra"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="controls" aria-label="Filtros de correlativas">
      <span class="controls-label" id="filtro-label">Árbol</span>
      <button id="btn-ambos" class="btn active" aria-labelledby="filtro-label btn-ambos" aria-pressed="true"
        onclick="setEdgeMode('ambos')">Ambos</button>
      <button id="btn-regular" class="btn" aria-labelledby="filtro-label btn-regular" aria-pressed="false"
        onclick="setEdgeMode('regular')">Regular</button>
      <button id="btn-aprobada" class="btn" aria-labelledby="filtro-label btn-aprobada" aria-pressed="false"
        onclick="setEdgeMode('aprobada')">Aprobada</button>
    </div>

    <div class="divider"></div>

    <!-- NUEVO: Botón Electivas -->
    <button id="btn-electivas" class="btn btn-electivas" aria-expanded="false" aria-controls="panel-electivas"
      onclick="toggleElectivas()">
      Electivas
    </button>

    <div class="divider" aria-hidden="true"></div>

    <div class="legend">
      <div class="leg-item">
        <div class="leg-dot" style="border-color:#22d3ee;background:#22d3ee33;"></div>
        <span>Cursable</span>
      </div>
      <div class="leg-item">
        <div class="leg-dot" style="border-color:#f59e0b;background:#f59e0b33;"></div>
        <span>Regular</span>
      </div>
      <div class="leg-item">
        <div class="leg-dot" style="border-color:#10b981;background:#10b98133;"></div>
        <span>Aprobada</span>
      </div>
      <div class="leg-item">
        <div class="leg-line" style="background:#22d3ee;"></div>
        <span>Req. Cursar</span>
      </div>
      <div class="leg-item">
        <div class="leg-line" style="background:#f59e0b;"></div>
        <span>Req. Rendir</span>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════
     CONTENIDO PRINCIPAL (Grafo de materias)
     ════════════════════════════════════════════════ -->
  <main>
    <div id="mynetwork"></div>
  </main>

  <!-- ═══════════════════════════════════════════════════
     PANEL LATERAL DE ELECTIVAS (Aside)
     ════════════════════════════════════════════════ -->
  <aside id="panel-electivas" class="panel-electivas" aria-hidden="true">
    <div class="panel-header">
      <div class="panel-title">
        <h2>ELECTIVAS</h2>
      </div>
      <button class="btn-close" onclick="toggleElectivas()" aria-label="Cerrar panel de electivas">✕</button>
    </div>

    <!-- Contador de horas -->
    <div class="electivas-progress" aria-live="polite">
      <div class="prog-label">
        <span id="e-horas-actual">0</span> / <span>20</span> horas completadas
      </div>
      <div class="prog-track" aria-hidden="true">
        <div class="prog-fill" id="e-barra"></div>
      </div>
      <div class="prog-pct" id="e-pct">0%</div>
    </div>

    <!-- Contenedor de nodos por nivel -->
    <div class="electivas-content" id="electivas-content" role="region"
      aria-label="Lista de materias electivas por nivel">
      <!-- Los nodos se generarán dinámicamente aquí -->
    </div>
  </aside>

  <!-- Overlay para cerrar panel -->
  <div id="panel-overlay" class="panel-overlay" aria-hidden="true" onclick="toggleElectivas()"></div>

  <!-- ═══════════════════════════════════════════════════
     TOOLTIP Y TOAST
     ════════════════════════════════════════════════ -->
  <div id="tooltip">
    <div class="tt-header">
      <div class="tt-name" id="tt-name"></div>
      <div class="tt-code" id="tt-code"></div>
    </div>
    <div class="tt-row">Estado: <span id="tt-estado"></span></div>
    <div class="tt-row">Para cursar: <span id="tt-cursar"></span></div>
    <div class="tt-row">Para rendir: <span id="tt-rendir"></span></div>
    <div class="tt-hint" id="tt-hint"></div>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>

  <script>
    // ── Cerrar sesión ──────────────────────────────
    async function cerrarSesion() {
      await window._sb.auth.signOut();
      window.location.replace('login.html');
    }

    // ── Panel de usuario ───────────────────────────
    function toggleUserPanel() {
      const panel   = document.getElementById('user-panel');
      const chevron = document.getElementById('user-chevron');
      const open    = panel.style.display === 'block';

      if (open) {
        panel.style.opacity = '0';
        panel.style.transform = 'translateY(-6px)';
        chevron.style.transform = 'rotate(0deg)';
        setTimeout(() => panel.style.display = 'none', 200);
      } else {
        panel.style.display = 'block';
        chevron.style.transform = 'rotate(180deg)';
        requestAnimationFrame(() => {
          panel.style.opacity = '1';
          panel.style.transform = 'translateY(0)';
        });
        cargarDatosUsuario();
      }
    }

    // Cerrar panel al hacer click afuera
    document.addEventListener('click', e => {
      const panel  = document.getElementById('user-panel');
      const btn    = document.getElementById('btn-user-panel');
      if (panel && panel.style.display === 'block' && !panel.contains(e.target) && !btn.contains(e.target)) {
        panel.style.opacity = '0';
        panel.style.transform = 'translateY(-6px)';
        document.getElementById('user-chevron').style.transform = 'rotate(0deg)';
        setTimeout(() => panel.style.display = 'none', 200);
      }
    });

    // ── Cargar datos del usuario ───────────────────
    async function cargarDatosUsuario() {
      const { data: { user } } = await window._sb.auth.getUser();
      if (!user) return;

      const email = user.email || '';
      const nombre = user.user_metadata?.full_name
        || user.user_metadata?.username
        || email.split('@')[0];
      const inicial = nombre.charAt(0).toUpperCase();

      document.getElementById('user-avatar').textContent      = inicial;
      document.getElementById('user-displayname').textContent = nombre;
      document.getElementById('user-email').textContent       = email;

      // Leer progreso desde los contadores ya calculados por script.js
      setTimeout(() => {
        const labelEl = document.getElementById('p-label');
        const pctEl   = document.getElementById('p-pct');
        if (labelEl) document.getElementById('panel-materias').textContent = labelEl.textContent;
        if (pctEl)   {
          const pct = pctEl.textContent;
          document.getElementById('panel-pct').textContent = pct;
          document.getElementById('panel-barra').style.width = pct;
        }
      }, 300);
    }
  </script>

</body>

</html>
